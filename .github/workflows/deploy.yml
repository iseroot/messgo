name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: ["completed"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
          DEPLOY_ENV_B64: ${{ secrets.DEPLOY_ENV_B64 }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script_stop: true
          envs: TARGET_SHA,DEPLOY_APP_DIR,DEPLOY_REPO_URL,DEPLOY_ENV_B64
          script: |
            set -euo pipefail

            APP_DIR="${DEPLOY_APP_DIR:-/opt/messgo}"
            REPO_URL="${DEPLOY_REPO_URL:-https://github.com/iseroot/messgo.git}"

            if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              if [ -d "$APP_DIR" ] && [ -n "$(ls -A "$APP_DIR" 2>/dev/null || true)" ]; then
                TS="$(date +%s)"
                BACKUP_DIR="${APP_DIR}.bak.${TS}"
                echo "Каталог $APP_DIR существует и не является git-репозиторием. Перемещаю в $BACKUP_DIR"
                $SUDO mv "$APP_DIR" "$BACKUP_DIR"
              fi

              $SUDO mkdir -p "$APP_DIR"
              $SUDO chown -R "$USER":"$USER" "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --tags
            git checkout "$TARGET_SHA"

            if [ -n "${DEPLOY_ENV_B64:-}" ]; then
              echo "$DEPLOY_ENV_B64" | base64 -d > "$APP_DIR/.env"
              chmod 600 "$APP_DIR/.env" || true
            fi

            PYTHON_BIN=""
            if command -v python3.12 >/dev/null 2>&1; then
              PYTHON_BIN="python3.12"
            elif command -v python3 >/dev/null 2>&1; then
              PYTHON_BIN="python3"
            fi

            if [ -n "$PYTHON_BIN" ]; then
              VER="$($PYTHON_BIN -c 'import sys; print(f\"{sys.version_info.major}.{sys.version_info.minor}\")')"
              if [ "$VER" != "3.12" ]; then
                echo "Нужен Python 3.12+. Обнаружен: $($PYTHON_BIN --version)"
                if command -v apt-get >/dev/null 2>&1; then
                  echo "Пробую установить python3.12 через apt..."
                  $SUDO apt-get update -y
                  $SUDO apt-get install -y software-properties-common || true
                  if command -v lsb_release >/dev/null 2>&1; then
                    CODENAME="$(lsb_release -cs || true)"
                    if [ "$CODENAME" = "jammy" ]; then
                      $SUDO add-apt-repository -y ppa:deadsnakes/ppa
                      $SUDO apt-get update -y
                    fi
                  fi
                  $SUDO apt-get install -y python3.12 python3.12-venv
                  PYTHON_BIN="python3.12"
                else
                  exit 1
                fi
              fi
            fi

            if ! command -v python3.12 >/dev/null 2>&1; then
              echo "На сервере нет python3.12. Установи Python 3.12 и python3.12-venv, затем повтори деплой."
              exit 1
            fi

            python3.12 -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install -e .

            if [ -f deploy/systemd/messgo.service ]; then
              $SUDO cp deploy/systemd/messgo.service /etc/systemd/system/messgo.service
            fi
            if [ -f deploy/Caddyfile ]; then
              $SUDO cp deploy/Caddyfile /etc/caddy/Caddyfile
            fi

            $SUDO systemctl daemon-reload
            $SUDO systemctl enable --now messgo.service
            $SUDO systemctl restart messgo.service

            if $SUDO systemctl list-unit-files | grep -q '^caddy'; then
              $SUDO systemctl restart caddy.service
            fi

            curl -fsS http://127.0.0.1:8000/health >/dev/null
