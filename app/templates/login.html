{% extends "base.html" %}
{% block content %}
<main class="auth-layout">
    <section class="card">
        <h1>messgo</h1>
        <p class="muted">Приватный лёгкий чат и аудиозвонки</p>

        <form id="login-form" class="stack" autocomplete="on">
            <h2>Вход</h2>
            <input type="text" name="username" placeholder="Логин" required minlength="3">
            <input type="password" name="password" placeholder="Пароль" required minlength="8">
            <button type="submit">Войти</button>
        </form>

        <form id="register-form" class="stack" autocomplete="on">
            <h2>Регистрация по инвайту</h2>
            <input type="text" name="username" placeholder="Логин" required minlength="3">
            <input type="text" name="display_name" placeholder="Отображаемое имя" required>
            <input type="password" name="password" placeholder="Пароль" required minlength="8">
            <input type="text" name="invite_code" placeholder="Инвайт-код" required minlength="6">
            <button type="submit">Создать аккаунт</button>
        </form>

        <p id="auth-error" class="error"></p>
    </section>
</main>
{% endblock %}
